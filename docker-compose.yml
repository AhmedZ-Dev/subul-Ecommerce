services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subul-Ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # change in production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: subul-backend:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=subul-Ecommerce;Username=postgres;Password=postgres;Pooling=true;
      Cors__AllowedOrigins__0: http://49.12.219.180:3000
      Jwt__Secret: change-this-jwt-secret-to-at-least-32-characters-in-production
      Jwt__Issuer: subul-admin
      Jwt__Audience: subul-admin-panel
      Jwt__AccessTokenMinutes: 480
    volumes:
      - ./img:/img
    ports:
      - "5101:5101"

  admin:
    image: subul-admin:latest
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata: